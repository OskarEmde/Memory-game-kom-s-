<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Master</title>
  <style>
    * {
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif
    }

    body {
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background-image: url("baggrund.png");
      color:#fff;padding:20px
    }

    .container {
      max-width:900px;
      width:100%;
      text-align:center;
      background:rgba(255,255,255,.12);
      backdrop-filter:blur(10px);
      padding:35px;
      border-radius:24px;
      box-shadow:0 12px 30px rgba(0,0,0,.25)
    }

    .logo {
      display: flex;
      align-items: flex-start;
      padding: 5px;
      margin: 5px;
    }
    h1 {
      display: grid;
      justify-content: center;
      align-items: center;
      padding: 10px;
      margin: 10px;
    }

    .stats {
      display:flex;
      justify-content:center;
      gap:30px;
      margin:18px 0;
      font-size:1.1rem;
      font-weight:bold
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(4,minmax(60px,90px));
      gap:12px;
      justify-content:center;
      margin:25px 0
    }

    .card {
      width:100%;
      aspect-ratio:1/1;
      background:#1d4ed8;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:2rem;
      cursor:pointer;
      transition:.3s;
      user-select:none
    }

    .card.flipped,.card.matched {
      background:#fb923c;
      transform:rotateY(180deg)
    }

    .card.matched {
      cursor:default;opacity:.85
    }

    button {
      border: none;
      background-image: linear-gradient(#f8ba35, #df6a0c);
      color:#0f172a;
      padding:14px 30px;
      border-radius:999px;
      font-size:1rem;
      font-weight:bold;
      cursor:pointer;
    }
    button:hover {
      box-shadow: 0 0 15px 5px rgb(244, 244, 244);
      transform: scale(1.2);
      background-image: linear-gradient(#b7c2ff, #5561d1);
      border-radius: 100px;
    }

    .overlay {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.7);
      display:none;
      align-items:center;
      justify-content:center
    }

    .win-box {
      background:white;
      color:#0f172a;
      padding:30px;
      border-radius:24px;
      text-align:center;
      max-width:320px;
    }

    .show {
      display:flex
    }
    @media (max-width: 768px)
    {
      .container {
        padding:20px
      }
      .stats {
        flex-direction:column;gap:10px
      }
      .grid {
        grid-template-columns:repeat(4,minmax(55px,1fr));gap:10px
      }
      .card {
        font-size:1.5rem;border-radius:14px
      }
      button {
        width:100%;max-width:260px
      }
      button:hover {
        width:100%;max-width:260px
      }
    }
    @media (max-width: 480px)
    {

      p {
        font-size:.95rem
      }
      .grid{grid-template-columns:repeat(4,minmax(50px,1fr));gap:8px}
    }
  </style>
</head>
<body>
<div class="container">
    <div class="logo">
      <img src="spilhuset-online.png">
    </div>
      <h1>
      <img src="Flagory logo.png" width="100%">
      </h1>
  <p>Find alle par og få fat i så mange point du kan</p>
  <div class="stats">
    <div>⭐ Point: <span id="score">0</span></div>
    <div>🎯 Træk: <span id="moves">0</span></div>
  </div>
  <div class="grid" id="grid"></div>
  <button onclick="startGame()">Nyt Spil</button>
</div>

<div class="overlay" id="overlay">
  <div class="win-box">
    <h2 id="resultTitle">🎉 Du vandt!</h2>
    <p id="resultText"></p>
    <button onclick="startGame()">Spil igen</button>
  </div>
</div>

<script>
  const baseSymbols=['🐶','🐱','🦊','🐸','🐼','🦄','🐯','🐵'];
  let cards=[], firstCard=null, secondCard=null, lock=false;
  let score=0,moves=0,matchedPairs=0;
  const grid=document.getElementById('grid');

  function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }

  function startGame(){
    cards = shuffle([...baseSymbols,...baseSymbols]);
    firstCard=secondCard=null; lock=false;
    score=0; moves=0; matchedPairs=0;
    document.getElementById('overlay').classList.remove('show');
    render(); updateStats();
  }

  function render(){
    grid.innerHTML='';
    cards.forEach((symbol,index)=>{
      const card=document.createElement('div');
      card.className='card';
      card.textContent='?';
      card.dataset.index=index;
      card.onclick=()=>flipCard(card,index,symbol);
      grid.appendChild(card);
    });
  }

  function flipCard(card,index,symbol){
    if(lock||card.classList.contains('flipped')||card.classList.contains('matched')) return;
    card.classList.add('flipped');
    card.textContent=symbol;
    if(!firstCard){ firstCard={card,index,symbol}; return; }
    secondCard={card,index,symbol};
    moves++;
    lock=true;
    if(firstCard.symbol===secondCard.symbol){
      firstCard.card.classList.add('matched');
      secondCard.card.classList.add('matched');
      score+=10; matchedPairs++;
      resetTurn();
      if(matchedPairs===baseSymbols.length) endGame(true);
    } else {
      score=Math.max(0,score-2);
      setTimeout(()=>{
        firstCard.card.classList.remove('flipped'); firstCard.card.textContent='?';
        secondCard.card.classList.remove('flipped'); secondCard.card.textContent='?';
        resetTurn();
      },800);
    }
    updateStats();
  }

  function resetTurn(){ firstCard=null; secondCard=null; lock=false; updateStats(); }
  function updateStats(){
    scoreEl.textContent=score;
    moves.textContent=moves;
  }

  function endGame(win){
    document.getElementById('resultTitle').textContent = '🎉 Du vandt!';

    document.getElementById('overlay').classList.add('show');
  }

  const scoreEl=document.getElementById('score');
  startGame();
</script>
</body>
</html>
